          TOTAL=$(nproc)
          LOAD=$(awk '{print int($1+0.5)}' /proc/loadavg)
          IDLE=$(( TOTAL - LOAD > 1 ? TOTAL - LOAD : 1 ))
          echo "count=$IDLE" >> $GITHUB_OUTPUT
      - uses: actions/download-artifact@v4
        with:
          name: build-artifacts
      - *a1
      - name: Run tests
        run: mvn test
          -Dtest=org.jsoup.integration.FuzzFixesTest,org.jsoup.integration.ParseTest,org.jsoup.integration.HttpClientConnectTest,org.jsoup.helper.W3CDomTest,org.jsoup.integration.ConnectTest,org.jsoup.integration.SessionTest,org.jsoup.helper.ValidateTest,org.jsoup.nodes.AttributeTest,org.jsoup.nodes.ElementTest,org.jsoup.nodes.FormElementTest,org.jsoup.nodes.PrinterTest,org.jsoup.parser.HtmlParserTest,org.jsoup.parser.PositionTest,org.jsoup.parser.TokenQueueTest,org.jsoup.parser.XmlTreeBuilderTest,org.jsoup.select.ElementsTest,org.jsoup.select.StructuralEvaluatorTest,org.jsoup.helper.DataUtilTest,org.jsoup.helper.HttpClientExecutorTest,org.jsoup.helper.HttpConnectionTest,org.jsoup.internal.SoftPoolTest,org.jsoup.internal.StringUtilTest,org.jsoup.nodes.AttributesTest,org.jsoup.nodes.CommentTest,org.jsoup.nodes.DataNodeTest,org.jsoup.nodes.DocumentTest,org.jsoup.nodes.DocumentTypeTest,org.jsoup.nodes.EntitiesTest,org.jsoup.nodes.NodeIteratorTest,org.jsoup.nodes.NodeTest,org.jsoup.parser.AttributeParseTest,org.jsoup.parser.CharacterReaderTest,org.jsoup.parser.ParserSettingsTest,org.jsoup.parser.ParserTest,org.jsoup.parser.StreamParserTest,org.jsoup.parser.TagSetTest,org.jsoup.parser.TagTest,org.jsoup.parser.TokeniserStateTest,org.jsoup.parser.TokeniserTest,org.jsoup.safety.CleanerTest,org.jsoup.select.CssTest,org.jsoup.select.EvaluatorTest,org.jsoup.select.NodesTest,org.jsoup.select.QueryParserTest,org.jsoup.select.SelectorTest,org.jsoup.select.TraversorTest,org.jsoup.select.XpathTest,org.jsoup.nodes.NodeStreamTest,org.jsoup.nodes.TextNodeTest,org.jsoup.safety.SafelistTest
          -DfailIfNoTests=false -Dsurefire.forkCount=${{
          steps.cores.outputs.count }} -Dsurefire.reuseForks=true
    needs:
      - build
