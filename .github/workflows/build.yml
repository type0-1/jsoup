# Scheduling settings used for this distribution
# algorithm: lpt
# risk_factor: 1
name: Build
on:
  push: null
  pull_request: null
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: "25"
          distribution: zulu
          cache: maven
      - name: Maven Compile
        run: mvn -X compile -B --file pom.xml -DskipTests
      - name: Maven Verify
        run: mvn -X verify -B --file pom.xml -DskipTests
      - uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: target/
  test-job-1:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: "25"
          distribution: zulu
          cache: maven
      - uses: actions/download-artifact@v4
        with:
          name: build-artifacts
      - &a1
        name: Detect available cores
        id: cores
        run: |-
          TOTAL=$(nproc)
          LOAD=$(awk '{print int($1+0.5)}' /proc/loadavg)
          IDLE=$(( TOTAL - LOAD > 1 ? TOTAL - LOAD : 1 ))
          echo "count=$IDLE" >> $GITHUB_OUTPUT
      - name: Run tests
        run: mvn test -Dtest=org.jsoup -DfailIfNoSpecifiedTests=false
          -Dsurefire.forkCount=${{ steps.cores.outputs.count }}
          -Dsurefire.reuseForks=true
    needs:
      - build
  test-job-2:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: "25"
          distribution: zulu
          cache: maven
      - uses: actions/download-artifact@v4
        with:
          name: build-artifacts
      - *a1
      - name: Run tests
        run: mvn test -Dtest=org.jsoup,org -DfailIfNoSpecifiedTests=false
          -Dsurefire.forkCount=${{ steps.cores.outputs.count }}
          -Dsurefire.reuseForks=true
    needs:
      - build
